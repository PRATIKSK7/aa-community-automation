name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-pipeline:
    name: CI Pipeline (Mocked)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Run npm ci
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run test:unit
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start mock server
        run: npm run mock-server > mock-server.log 2>&1 &

      - name: Wait until localhost:4000 is ready
        run: npx wait-on http://localhost:4000 || (cat mock-server.log && exit 1)

      - name: Run API tests
        env:
          USE_MOCK_API: "true"
        run: npm run test:api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Upload Mock Server Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-server-log
          path: mock-server.log
          retention-days: 30

